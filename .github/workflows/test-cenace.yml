name: test-cenace
on: { workflow_dispatch: {} }
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Try CENACE fetch from a GitHub (Azure) runner
        run: |
          python scripts/fetch_demand.py --out /tmp/d || true
          python - <<'PY'
          import json,os
          p='/tmp/d/today.json'
          if not os.path.exists(p): print("NO FILE"); raise SystemExit
          d=json.load(open(p)); r=d.get('regions',{})
          print("regions with data:", len(r))
          sin=r.get('Sistema Interconectado Nacional')
          print("SIN latest:", sin and sin.get('latest'))
          PY
