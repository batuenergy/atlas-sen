name: Demand snapshot

# Optional self-hosted live-demand feed for forks. DISABLED by default: scheduled runs
# require an orphan `data` branch to exist AND a deployment that reads it. (Batu's
# production live demand comes from an app route instead, so this isn't used there.)
# To enable: create an orphan `data` branch, add a `schedule:` trigger below, and
# re-enable the workflow in the repo's Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: demand-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data        # dedicated data branch
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
        # requirements.txt is on main; fetch it explicitly if absent on the data branch
        continue-on-error: true
      - name: Fetch snapshot
        run: |
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/fetch_demand.py -o fetch_demand.py
          python fetch_demand.py --out public/data/demand --history
      - name: Commit if changed
        run: |
          git config user.name "atlas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A public/data/demand
          git diff --quiet --cached || git commit -m "data: demand snapshot $(date -u +%FT%TZ)"
          git push
