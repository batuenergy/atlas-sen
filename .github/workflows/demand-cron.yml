name: Demand snapshot

# Fetches CENACE semi-real-time demand and commits it to the `data` branch.
# Runs on a GitHub (Azure) runner because CENACE serves those IPs but rejects Vercel's
# datacenter IPs (returns empty/500). The preview polls the snapshot via raw.githubusercontent
# (CORS + 5-min cache). Keeps `main` clean by committing to the dedicated `data` branch.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: demand-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch CENACE snapshot
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/fetch_demand.py" -o fetch_demand.py
          python fetch_demand.py --out public/data/demand --history
      - name: Commit if changed
        run: |
          git config user.name "atlas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A public/data/demand
          git diff --quiet --cached || git commit -m "data: demand snapshot $(date -u +%FT%TZ)"
          git push
