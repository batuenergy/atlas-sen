name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check scripts tests
      - name: Data invariant tests (against committed public/data/atlas.json)
        run: pytest tests/ -q
        # Note: `make build` needs the gitignored coordinate sources, so it's a local/
        # maintainer step — CI validates the committed bundle rather than rebuilding it.
      - name: Install Playwright
        run: |
          cd tests/e2e
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: UI regression tests
        run: cd tests/e2e && npx playwright test
